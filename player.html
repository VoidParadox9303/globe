<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TVStreamz - Player</title>
  <meta name="theme-color" content="#0a0a0f">
  <!-- Tailwind (production CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Shaka Player and UI (v4.7 – more stable) -->
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.ui.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/controls.css" />
  <style>
    .glass { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); }
    .bg-background { background-color: #0a0a0f; }
    .bg-card { background-color: #14141a; }
    .border-border { border-color: #2a2a33; }
    .text-muted-foreground { color: #a1a1aa; }
    .text-primary { color: #8b5cf6; }
    .bg-primary { background-color: #8b5cf6; }
    .from-primary { --tw-gradient-from: #8b5cf6; }
    .to-accent { --tw-gradient-to: #ec4899; }
    .text-gradient {
      background: linear-gradient(to right, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .shaka-video-container {
      width: 100%;
      height: 100%;
    }
    /* Error message styling */
    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      text-align: center;
    }
  </style>
</head>
<body class="bg-background text-white antialiased">

<div class="pb-16 md:pb-0">
  <!-- Navbar (same as before) -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <a class="flex items-center gap-2" href="/">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center">
              <i data-lucide="tv" class="w-6 h-6 text-white"></i>
            </div>
            <span class="text-xl font-bold text-gradient hidden sm:block">TVStreamz</span>
          </a>
          <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary/10 border border-primary/20">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <i data-lucide="users" class="w-3.5 h-3.5 text-primary"></i>
            <span class="text-xs font-semibold text-primary tabular-nums">20</span>
            <span class="text-[10px] text-muted-foreground hidden sm:inline">online</span>
          </div>
        </div>
        <div class="hidden md:flex items-center gap-1">
          <a href="/" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="house" class="w-4 h-4"></i>Home</a>
          <a href="/movies" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="film" class="w-4 h-4"></i>Movies</a>
          <a href="/tv-shows" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="monitor-play" class="w-4 h-4"></i>TV Shows</a>
          <a href="/anime" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="sparkles" class="w-4 h-4"></i>Anime</a>
          <a href="/live-tv" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 bg-primary/20 text-primary"><i data-lucide="tv" class="w-4 h-4"></i>Live TV</a>
        </div>
        <div class="flex items-center gap-1">
          <button class="p-2 text-muted-foreground hover:text-foreground"><i data-lucide="search" class="w-5 h-5"></i></button>
          <button class="p-2 text-muted-foreground hover:text-foreground relative"><i data-lucide="bell" class="w-5 h-5"></i></button>
          <!-- Theme toggle -->
          <button id="theme-toggle" class="relative w-14 h-7 rounded-full transition-colors duration-500 focus:outline-none" style="background: linear-gradient(135deg, #1f242e, #33334d);">
            <span class="absolute top-1.5 left-2 w-1 h-1 rounded-full bg-white/80"></span>
            <span class="absolute top-3 left-5 w-0.5 h-0.5 rounded-full bg-white/60"></span>
            <span class="absolute bottom-2 left-3 w-0.5 h-0.5 rounded-full bg-white/50"></span>
            <span class="absolute bottom-1 right-2 w-3 h-1.5 rounded-full bg-white/60 opacity-0"></span>
            <span class="absolute bottom-1.5 right-4 w-2 h-1 rounded-full bg-white/40 opacity-0"></span>
            <span id="toggle-thumb" class="absolute top-0.5 flex items-center justify-center w-6 h-6 rounded-full shadow-md transition-all duration-500 ease-in-out" style="left: calc(100% - 1.625rem); background: linear-gradient(135deg, #ddd, #c6c2b9);">
              <i data-lucide="moon" class="w-3.5 h-3.5 text-slate-600"></i>
            </span>
          </button>
          <button class="p-2 text-muted-foreground hover:text-foreground md:hidden"><i data-lucide="menu" class="w-5 h-5"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <div class="h-screen bg-background flex flex-col overflow-hidden pt-16">
    <div class="flex-1 overflow-y-auto pb-12">
      <div class="container mx-auto px-4">
        <!-- Back link -->
        <div class="py-3">
          <a href="/live-tv" class="inline-flex items-center gap-2 text-sm hover:bg-accent rounded-md px-3 py-2">
            <i data-lucide="chevron-left" class="w-4 h-4"></i>Back to Live TV
          </a>
        </div>

        <!-- Channel info and player -->
        <div class="max-w-4xl mx-auto w-full">
          <div class="flex items-center gap-3 mb-3">
            <img id="channel-logo" src="" alt="" class="w-10 h-10 object-contain rounded-lg bg-secondary p-1.5">
            <div>
              <h1 id="channel-name" class="text-lg font-bold"></h1>
              <div class="flex items-center gap-2 text-xs">
                <i data-lucide="radio" class="w-3 h-3 text-green-500 animate-pulse"></i>
                <span class="text-green-500">Live Now</span>
              </div>
            </div>
          </div>

          <!-- Video player container with Shaka UI -->
          <div class="aspect-video w-full rounded-xl overflow-hidden bg-card border border-border relative">
            <div id="shaka-container" class="shaka-video-container w-full h-full" data-shaka-player-container>
              <video id="video-player" class="shaka-video w-full h-full" autoplay playsinline muted></video>
            </div>
          </div>

          <!-- Error display (hidden by default) -->
          <div id="error-message" class="error-message hidden"></div>

          <!-- Proxy info -->
          <div class="flex items-center gap-1.5 mt-2 px-1">
            <i data-lucide="shield" class="w-3.5 h-3.5 text-muted-foreground"></i>
            <span class="text-xs text-muted-foreground">Proxy: <span class="font-medium text-accent-foreground">Backup 5</span></span>
          </div>

          <!-- Share button -->
          <div class="flex justify-start mt-3">
            <button class="inline-flex items-center gap-2 border border-input bg-background hover:bg-accent rounded-md px-3 py-2 text-sm">
              <i data-lucide="share-2" class="w-4 h-4"></i>Share
            </button>
          </div>
        </div>

        <!-- Other channels -->
        <div class="mt-6 max-w-4xl mx-auto w-full">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold">Other Channels</h2>
            <button class="flex items-center justify-between rounded-md border border-input px-3 py-2 text-xs w-[140px] h-8 bg-card">
              <span class="flex items-center gap-2"><i data-lucide="arrow-up-a-z" class="w-3 h-3"></i>A-Z</span>
              <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
            </button>
          </div>
          <div class="border border-border rounded-xl bg-card/50 p-3">
            <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-2 max-h-[280px] overflow-y-auto pr-2" id="other-channels"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 md:hidden bg-card/95 backdrop-blur-lg border-t border-border/50 pb-safe">
    <div class="flex items-center justify-around h-16">
      <a href="/" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="house" class="w-5 h-5"></i><span class="text-[10px]">Home</span></a>
      <a href="/movies" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="film" class="w-5 h-5"></i><span class="text-[10px]">Movies</span></a>
      <a href="/tv-shows" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="monitor-play" class="w-5 h-5"></i><span class="text-[10px]">TV</span></a>
      <a href="/anime" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="sparkles" class="w-5 h-5"></i><span class="text-[10px]">Anime</span></a>
      <a href="/live-tv" class="flex flex-col items-center gap-1 text-primary"><i data-lucide="tv" class="w-5 h-5"></i><span class="text-[10px]">Live</span></a>
    </div>
  </nav>
</div>

<script>
  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const name = urlParams.get('name') || 'Channel';
  const logo = urlParams.get('logo') || '';
  const manifestUri = urlParams.get('url') || '';
  const licenseKey = urlParams.get('key') || '';

  document.getElementById('channel-name').textContent = name;
  document.getElementById('channel-logo').src = logo;

  // Helper to show errors
  function showError(message) {
    const errorDiv = document.getElementById('error-message');
    errorDiv.textContent = message;
    errorDiv.classList.remove('hidden');
  }

  // Initialize Shaka Player
  async function initPlayer() {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) {
      showError('Shaka Player not supported in this browser.');
      return;
    }

    const video = document.getElementById('video-player');
    const player = new shaka.Player(video);

    // Configure ClearKey if license key is present
    if (licenseKey) {
      const [keyId, key] = licenseKey.split(':');
      const config = {
        drm: {
          clearKeys: {
            [keyId]: key
          }
        }
      };
      player.configure(config);
    }

    // Listen for errors
    player.addEventListener('error', (e) => {
      showError('Playback error: ' + e.detail.message);
    });

    try {
      // Load the manifest first (do NOT attach UI before loading)
      await player.load(manifestUri);
      console.log('Stream loaded successfully');

      // Now attach the UI after the manifest is ready
      const uiContainer = document.getElementById('shaka-container');
      const ui = new shaka.ui.Overlay(player, uiContainer, video);
      const uiConfig = {
        controlPanelElements: ['play_pause', 'time_and_duration', 'volume', 'fullscreen', 'overflow_menu'],
        overflowMenuButtons: ['captions', 'quality', 'playback_rate'],
      };
      ui.configure(uiConfig);
    } catch (e) {
      showError('Failed to load stream: ' + e.message);
      console.error(e);
    }
  }

  if (manifestUri) {
    initPlayer();
  } else {
    showError('No stream URL provided.');
  }

  // Populate other channels (using same M3U parsing as index)
  const m3uText = `#EXTM3U url-tvg="..."
#EXTINF:-1 tvg-id="" tvg-logo="https://divign0fdw3sv.cloudfront.net/Images/ChannelLogo/contenthub/449_144.png" group-title="Cignal", HBO Hits
#KODIPROP:inputstreamaddon=inputstream.adaptive
#KODIPROP:inputstream.adaptive.manifest_type=dash 
#KODIPROP:inputstream.adaptive.license_type=org.w3.clearkey
#KODIPROP:inputstream.adaptive.license_key=b04ae8017b5b4601a5a0c9060f6d5b7d:a8795f3bdb8a4778b7e888ee484cc7a1
https://tiny-sky-b9fd.v32k84wntwbguzg6hf4tkrsq.workers.dev/?url=https://qp-pldt-live-bpk-02-prod.akamaized.net/bpk-tv/cg_hbohits/default/index.mpd

#EXTINF:-1 tvg-id="" tvg-logo="https://i.imgur.com/pRwyOMP.png" group-title="Local", A2Z
https://example.com/stream.mpd
`;

  function parseM3U(m3u) {
    const lines = m3u.split('\n');
    const channels = [];
    let current = {};

    lines.forEach(line => {
      line = line.trim();
      if (line.startsWith('#EXTINF:')) {
        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
        const nameMatch = line.match(/,(.+)$/);
        const groupMatch = line.match(/group-title="([^"]+)"/);
        current.logo = logoMatch ? logoMatch[1] : '';
        current.name = nameMatch ? nameMatch[1].trim() : 'Unknown';
        current.group = groupMatch ? groupMatch[1] : '';
      } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key')) {
        const keyMatch = line.match(/license_key=([a-f0-9:]+)/);
        if (keyMatch) current.licenseKey = keyMatch[1];
      } else if (line.startsWith('http') && !line.includes('#') && current.name) {
        current.url = line;
        channels.push({ ...current });
        current = {};
      }
    });
    return channels;
  }

  const allChannels = parseM3U(m3uText);
  const otherContainer = document.getElementById('other-channels');
  const currentUrl = manifestUri;

  allChannels.filter(ch => ch.url !== currentUrl).forEach(ch => {
    const params = new URLSearchParams({
      name: ch.name,
      logo: ch.logo,
      url: ch.url,
      key: ch.licenseKey || ''
    }).toString();
    const btn = document.createElement('a');
    btn.href = `player.html?${params}`;
    btn.className = 'flex flex-col items-center p-2 rounded-lg bg-background border border-border hover:border-primary/50 hover:bg-accent/50 transition-all duration-200 group';
    btn.innerHTML = `
      <img src="${ch.logo}" alt="${ch.name}" class="w-8 h-8 sm:w-10 sm:h-10 object-contain rounded-md bg-secondary/50 p-1">
      <p class="font-medium text-[9px] sm:text-[10px] group-hover:text-primary transition-colors text-center mt-1.5 line-clamp-1 w-full">${ch.name}</p>
    `;
    otherContainer.appendChild(btn);
  });

  lucide.createIcons();

  // Theme toggle
  const toggle = document.getElementById('theme-toggle');
  const thumb = document.getElementById('toggle-thumb');
  const moonIcon = thumb.querySelector('i');
  const html = document.documentElement;

  toggle.addEventListener('click', () => {
    const isDark = html.classList.contains('dark');
    if (isDark) {
      html.classList.remove('dark');
      html.classList.add('light');
      html.style.colorScheme = 'light';
      thumb.style.left = '0.25rem';
      moonIcon.setAttribute('data-lucide', 'sun');
    } else {
      html.classList.remove('light');
      html.classList.add('dark');
      html.style.colorScheme = 'dark';
      thumb.style.left = 'calc(100% - 1.625rem)';
      moonIcon.setAttribute('data-lucide', 'moon');
    }
    lucide.createIcons();
  });
</script>
</body>
</html>
