<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TVStreamz - Live TV</title>
  <meta name="theme-color" content="#0a0a0f">
  <!-- Tailwind (production CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); }
    .bg-background { background-color: #0a0a0f; }
    .bg-card { background-color: #14141a; }
    .border-border { border-color: #2a2a33; }
    .text-muted-foreground { color: #a1a1aa; }
    .text-primary { color: #8b5cf6; }
    .bg-primary { background-color: #8b5cf6; }
    .bg-primary\/10 { background-color: rgba(139, 92, 246, 0.1); }
    .bg-primary\/20 { background-color: rgba(139, 92, 246, 0.2); }
    .from-primary { --tw-gradient-from: #8b5cf6; }
    .to-accent { --tw-gradient-to: #ec4899; }
    .text-gradient {
      background: linear-gradient(to right, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.3);
    }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-background text-white antialiased">

<div id="root" class="pb-16 md:pb-0">
  <!-- Navbar (same as before) -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <a class="flex items-center gap-2" href="/">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center">
              <i data-lucide="tv" class="w-6 h-6 text-white"></i>
            </div>
            <span class="text-xl font-bold text-gradient hidden sm:block">TVStreamz</span>
          </a>
          <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary/10 border border-primary/20">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            <i data-lucide="users" class="w-3.5 h-3.5 text-primary"></i>
            <span class="text-xs font-semibold text-primary tabular-nums">20</span>
            <span class="text-[10px] text-muted-foreground hidden sm:inline">online</span>
          </div>
        </div>
        <div class="hidden md:flex items-center gap-1">
          <a href="/" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="house" class="w-4 h-4"></i>Home</a>
          <a href="/movies" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="film" class="w-4 h-4"></i>Movies</a>
          <a href="/tv-shows" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="monitor-play" class="w-4 h-4"></i>TV Shows</a>
          <a href="/anime" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 text-muted-foreground hover:text-foreground hover:bg-secondary"><i data-lucide="sparkles" class="w-4 h-4"></i>Anime</a>
          <a href="/live-tv" class="flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-200 bg-primary/20 text-primary"><i data-lucide="tv" class="w-4 h-4"></i>Live TV</a>
        </div>
        <div class="flex items-center gap-1">
          <button class="p-2 text-muted-foreground hover:text-foreground"><i data-lucide="search" class="w-5 h-5"></i></button>
          <button class="p-2 text-muted-foreground hover:text-foreground relative"><i data-lucide="bell" class="w-5 h-5"></i></button>
          <!-- Theme toggle -->
          <button id="theme-toggle" class="relative w-14 h-7 rounded-full transition-colors duration-500 focus:outline-none" style="background: linear-gradient(135deg, #1f242e, #33334d);">
            <span class="absolute top-1.5 left-2 w-1 h-1 rounded-full bg-white/80" id="star1"></span>
            <span class="absolute top-3 left-5 w-0.5 h-0.5 rounded-full bg-white/60" id="star2"></span>
            <span class="absolute bottom-2 left-3 w-0.5 h-0.5 rounded-full bg-white/50" id="star3"></span>
            <span class="absolute bottom-1 right-2 w-3 h-1.5 rounded-full bg-white/60 opacity-0" id="cloud1"></span>
            <span class="absolute bottom-1.5 right-4 w-2 h-1 rounded-full bg-white/40 opacity-0" id="cloud2"></span>
            <span id="toggle-thumb" class="absolute top-0.5 flex items-center justify-center w-6 h-6 rounded-full shadow-md transition-all duration-500 ease-in-out" style="left: calc(100% - 1.625rem); background: linear-gradient(135deg, #ddd, #c6c2b9);">
              <i data-lucide="moon" class="w-3.5 h-3.5 text-slate-600"></i>
            </span>
          </button>
          <button class="p-2 text-muted-foreground hover:text-foreground md:hidden"><i data-lucide="menu" class="w-5 h-5"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-12">
    <div class="container mx-auto px-4">
      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full bg-red-500/20 flex items-center justify-center">
            <i data-lucide="radio" class="w-6 h-6 text-red-500 animate-pulse"></i>
          </div>
          <div>
            <h1 class="text-3xl md:text-4xl font-bold">Live TV</h1>
            <p class="text-muted-foreground">Watch your favorite channels live</p>
          </div>
        </div>
        <button class="flex items-center justify-between rounded-md border border-input px-3 py-2 text-sm w-[180px] bg-card">
          <span class="flex items-center gap-2"><i data-lucide="arrow-up-a-z" class="w-4 h-4"></i>A-Z</span>
          <i data-lucide="chevron-down" class="w-4 h-4 opacity-50"></i>
        </button>
      </div>

      <!-- Category filters (static) -->
      <div class="flex gap-2 mb-8 overflow-x-auto pb-2 scrollbar-hide">
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-primary text-white shadow-md">All</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">Filipino</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">News</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">Sports</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">Movies</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">Anime</button>
        <button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap bg-secondary text-secondary-foreground hover:bg-secondary/80">Kids</button>
      </div>

      <!-- Channel grid -->
      <div class="grid grid-cols-3 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6" id="channel-grid"></div>

      <!-- Info box -->
      <div class="mt-12 p-6 rounded-xl bg-card border border-border">
        <h2 class="font-semibold mb-2">About Live TV</h2>
        <p class="text-sm text-muted-foreground">Stream your favorite Filipino channels live. Some channels may require specific browser support for DRM playback.</p>
      </div>
    </div>
  </main>

  <!-- Mobile bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-50 md:hidden bg-card/95 backdrop-blur-lg border-t border-border/50 pb-safe">
    <div class="flex items-center justify-around h-16">
      <a href="/" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="house" class="w-5 h-5"></i><span class="text-[10px]">Home</span></a>
      <a href="/movies" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="film" class="w-5 h-5"></i><span class="text-[10px]">Movies</span></a>
      <a href="/tv-shows" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="monitor-play" class="w-5 h-5"></i><span class="text-[10px]">TV</span></a>
      <a href="/anime" class="flex flex-col items-center gap-1 text-muted-foreground"><i data-lucide="sparkles" class="w-5 h-5"></i><span class="text-[10px]">Anime</span></a>
      <a href="/live-tv" class="flex flex-col items-center gap-1 text-primary"><i data-lucide="tv" class="w-5 h-5"></i><span class="text-[10px]">Live</span></a>
    </div>
  </nav>
</div>

<script>
  // ----- M3U PLAYLIST – now fetched from external file -----
  async function loadChannels() {
    try {
      const response = await fetch('/playlist.m3u');
      const m3uText = await response.text();

      // ----- M3U PARSER (returns array of channels) -----
      function parseM3U(m3u) {
        const lines = m3u.split('\n');
        const channels = [];
        let current = {};

        lines.forEach(line => {
          line = line.trim();
          // Skip empty lines and comments that are not #EXTINF (like group logos)
          if (line === '' || line.startsWith('#EXTM3U') || line.startsWith('#KODIPROP') || line.startsWith('***')) return;

          if (line.startsWith('#EXTINF:')) {
            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            const nameMatch = line.match(/,(.+)$/);
            const groupMatch = line.match(/group-title="([^"]+)"/);
            current.logo = logoMatch ? logoMatch[1] : '';
            current.name = nameMatch ? nameMatch[1].trim() : 'Unknown';
            current.group = groupMatch ? groupMatch[1] : '';
            // Generate a URL-friendly ID from the name
            current.id = current.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
          } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key')) {
            const keyMatch = line.match(/license_key=([a-f0-9:]+)/);
            if (keyMatch) current.licenseKey = keyMatch[1];
          } else if (line.startsWith('http') && !line.includes('#') && current.name) {
            current.url = line;
            channels.push({ ...current });
            current = {};
          }
        });
        return channels;
      }

      const channels = parseM3U(m3uText);
      const grid = document.getElementById('channel-grid');

      // Build the channel grid
      channels.forEach(ch => {
        const card = document.createElement('a');
        card.href = `/${ch.id}`; // Clean URL like /hbo-hits
        card.className = 'group relative block rounded-xl overflow-hidden card-hover bg-card border border-border';
        card.innerHTML = `
          <div class="aspect-square sm:aspect-video relative">
            <img src="${ch.logo}" alt="${ch.name}" class="w-full h-full object-contain p-2 sm:p-4 bg-secondary/50" loading="lazy">
            <div class="absolute top-1.5 left-1.5 sm:top-3 sm:left-3 flex items-center gap-1 sm:gap-1.5 px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-full bg-red-500/90 text-white text-[10px] sm:text-xs font-medium">
              <i data-lucide="radio" class="w-2 h-2 sm:w-3 sm:h-3 animate-pulse"></i>
              <span class="hidden sm:inline">LIVE</span>
            </div>
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 bg-background/40">
              <div class="w-10 h-10 sm:w-14 sm:h-14 rounded-full bg-primary/90 flex items-center justify-center shadow-lg transform scale-75 group-hover:scale-100 transition-transform duration-300">
                <i data-lucide="play" class="w-4 h-4 sm:w-6 sm:h-6 text-white ml-0.5" fill="currentColor"></i>
              </div>
            </div>
          </div>
          <div class="p-2 sm:p-4">
            <h3 class="font-semibold text-xs sm:text-base group-hover:text-primary transition-colors line-clamp-1">${ch.name}</h3>
            <p class="text-[10px] sm:text-xs text-muted-foreground mt-0.5 sm:mt-1 uppercase hidden sm:block">${ch.group || 'Live'}</p>
          </div>
        `;
        grid.appendChild(card);
      });

      lucide.createIcons();
    } catch (error) {
      console.error('Failed to load playlist:', error);
      document.getElementById('channel-grid').innerHTML = '<p class="text-red-500">Failed to load channels. Please try again later.</p>';
    }
  }

  loadChannels();

  // Theme toggle
  const toggle = document.getElementById('theme-toggle');
  const thumb = document.getElementById('toggle-thumb');
  const moonIcon = thumb.querySelector('i');
  const html = document.documentElement;

  toggle.addEventListener('click', () => {
    const isDark = html.classList.contains('dark');
    if (isDark) {
      html.classList.remove('dark');
      html.classList.add('light');
      html.style.colorScheme = 'light';
      thumb.style.left = '0.25rem';
      moonIcon.setAttribute('data-lucide', 'sun');
    } else {
      html.classList.remove('light');
      html.classList.add('dark');
      html.style.colorScheme = 'dark';
      thumb.style.left = 'calc(100% - 1.625rem)';
      moonIcon.setAttribute('data-lucide', 'moon');
    }
    lucide.createIcons();
  });
</script>
</body>
</html>
